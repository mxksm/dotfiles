hide_window_decorations titlebar-and-corners 

# --- Window Appearance ---
# Adds breathing room around the edges (adjust the number to your liking)
window_padding_width 5
#window_margin_width 10 0 10 0

# --- Mac Specific Keyboard Fix ---
# By default on macOS, the Option key types special characters (like ƒ or ∂).
# This forces the Option key to act as a standard Alt/Meta key, which is 
# absolutely essential for using your normal keyboard shortcuts.
macos_option_as_alt yes

# --- Font Configuration (Optional but recommended) ---
# Kitty is very strict about only using true monospaced fonts.
# You can change this to whatever font you currently use.
font_family      Menlo
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# --- Performance ---
# Syncs screen updates to your monitor's refresh rate to prevent screen tearing
sync_to_monitor yes

# --- Cursor ---
# Forces the cursor to be a solid square (block)
cursor_shape block

# (Optional) Stops the cursor from blinking to match standard vintage terminals
cursor_blink_interval 0

# (Optional) Prevents Kitty's shell integration from overriding your cursor shape 
# if you use vi-mode in zsh/bash
shell_integration no-cursor

# --- Colors ---
# Sets the terminal background color
background #282C34
#background #eff1f5

# --- Tab Navigation Keybindings ---
# Maps Command + Number to switch to the corresponding tab
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# --- Tab Bar Customization ---
# Forces the tab title to display only the tab number
tab_title_template "{index}"

# Hides the tab bar if there is only 1 tab open
tab_bar_min_tabs 2

# Allows external scripts to change Kitty's settings on the fly
allow_remote_control yes

# --- Window Resizing Fix ---
placement_strategy top-left

# --- Discrete Tab Bar ---
# Centers the tab bar
tab_bar_align center

# Removes the default background shapes/fades
tab_bar_style separator
tab_separator " | "

# Active tab: Bright text, background matches your terminal
active_tab_foreground   #ffffff
active_tab_background   #282C34
active_tab_font_style   bold

# Inactive tabs: Dimmed text, background matches your terminal
inactive_tab_foreground #5c6370
inactive_tab_background #282C34
inactive_tab_font_style normal

# The background color of the entire tab bar row
tab_bar_background      #282C34

# Removes the extra empty space above and below the tab bar
# The first number is the outside margin (edge of window), the second is the inside margin (next to terminal text)
tab_bar_margin_height 10.0 0.0
